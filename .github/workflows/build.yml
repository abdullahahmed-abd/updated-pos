name: Build POS App - All Platforms

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Windows App
        run: npm run electron:build:win:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.zip



  build-mac:
    runs-on: macos-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🧹 Clean Electron Cache
        run: |
          rm -rf ~/Library/Caches/electron
          rm -rf ~/Library/Caches/electron-builder

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Universal Mac App
        run: npm run electron:build:mac:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 📤 Upload Mac Build
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
            release/*.zip



  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: 📦 Install Node Dependencies
        run: npm ci

      - name: 🏗️ Build Linux App
        run: npm run electron:build:linux:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm



  create-release:
    needs:
      - build-windows
      - build-mac
      - build-linux

    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/')

    steps:

      - name: ⬇️ Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: ⬇️ Download Mac Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/mac

      - name: ⬇️ Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2

        with:
          tag_name: ${{ github.ref_name }}

          name: POSApp ${{ github.ref_name }}

          body: |
            ## POSApp Downloads

            ### 🍎 macOS
            If app does not open:

            Open terminal and run:

            xattr -cr /Applications/POSApp.app

            Then open app again.

            ### 🪟 Windows
            If SmartScreen warning appears:
            More Info → Run Anyway

            ### 🐧 Linux
            chmod +x POSApp.AppImage
            ./POSApp.AppImage

          files: |
            artifacts/windows/**/*
            artifacts/mac/**/*
            artifacts/linux/**/*

          draft: false
          prerelease: false

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}