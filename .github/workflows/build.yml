name: Build POS App - All Platforms

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Windows App
        run: npm run electron:build:win:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.zip



  build-mac:
    runs-on: macos-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🧹 Clean Electron Cache
        run: |
          rm -rf ~/Library/Caches/electron
          rm -rf ~/Library/Caches/electron-builder

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Mac App (Ad-hoc Signed)
        run: npm run electron:build:mac:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Verify Ad-hoc Signature
        run: |
          echo "🔍 Checking app signature..."
          find release/mac* -name "*.app" -maxdepth 2 -type d 2>/dev/null | while read app; do
            echo "📦 App: $app"
            codesign -dv --verbose=4 "$app" 2>&1 || echo "⚠️ Signature check failed"
            echo "---"
          done

      - name: 📤 Upload Mac Build
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
            release/*.zip



  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: 📦 Install Node Dependencies
        run: npm ci

      - name: 🏗️ Build Linux App
        run: npm run electron:build:linux:ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm



  create-release:
    needs:
      - build-windows
      - build-mac
      - build-linux

    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/')

    steps:

      - name: ⬇️ Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: ⬇️ Download Mac Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/mac

      - name: ⬇️ Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2

        with:
          tag_name: ${{ github.ref_name }}

          name: POSApp ${{ github.ref_name }}

          body: |
            ## 📦 POSApp Downloads

            ---

            ### 🍎 macOS

            **Download the correct file for your Mac:**
            - **Apple Silicon (M1/M2/M3):** `POSApp-x.x.x-mac-arm64.dmg`
            - **Intel Mac:** `POSApp-x.x.x-mac-x64.dmg`

            **Installation:**
            1. Open the DMG file
            2. Drag **POSApp** to **Applications** folder
            3. Open **Applications** folder
            4. **Right-click** on POSApp → Click **"Open"**
            5. Click **"Open"** in the warning dialog
            6. ✅ App will launch

            **If app still does not open, run this in Terminal:**
            ```
            sudo xattr -cr /Applications/POSApp.app
            ```
            Then open app again.

            ---

            ### 🪟 Windows

            - **Installer:** `POSApp Setup x.x.x.exe`
            - **Portable:** `POSApp x.x.x.exe`

            If SmartScreen warning appears:
            **More Info → Run Anyway**

            ---

            ### 🐧 Linux

            **AppImage:**
            ```
            chmod +x POSApp-x.x.x.AppImage
            ./POSApp-x.x.x.AppImage
            ```

            **Debian / Ubuntu:**
            ```
            sudo dpkg -i pos_frontend_dev_x.x.x_amd64.deb
            ```

            **Fedora / RHEL:**
            ```
            sudo rpm -i pos_frontend_dev-x.x.x.x86_64.rpm
            ```

          files: |
            artifacts/windows/**/*
            artifacts/mac/**/*
            artifacts/linux/**/*

          draft: false
          prerelease: false

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}